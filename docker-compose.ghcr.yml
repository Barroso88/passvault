version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: passvault-db
    environment:
      POSTGRES_USER: passvault_user
      POSTGRES_PASSWORD: passvault_secret
      POSTGRES_DB: passvault
    ports:
      - "5432:5432"
    volumes:
      - passvault_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - passvault_net

  app:
    image: ghcr.io/barroso88/passvault:latest
    container_name: passvault-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://passvault_user:passvault_secret@postgres:5432/passvault
      PORT: 3001
    ports:
      - "3071:3001"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - passvault_net

volumes:
  passvault_data:

networks:
  passvault_net:
    driver: bridge
